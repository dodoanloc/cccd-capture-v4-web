<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCCD QR-First Webapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-shell">
    <section id="cameraSection" class="camera-section">
      <div class="camera-header">
        <div>
          <div class="mini-label">CCCD FLOW</div>
          <h1 id="stepTitle">Quét QR</h1>
        </div>
        <button id="switchCameraBtn" class="ghost-btn">Đổi camera</button>
        <button id="toggleConfigBtn" class="ghost-btn">API</button>
      </div>

      <div id="configPanel" class="config-panel" style="display:none;">
        <input id="apiBase" placeholder="Backend API" value="https://backendcccd.agrithoxuan.id.vn" />
      </div>

      <div class="stepper">
        <div id="stepQr" class="step-chip active">QR</div>
        <div id="stepFront" class="step-chip">Mặt trước</div>
        <div id="stepBack" class="step-chip">Mặt sau</div>
        <div id="stepReview" class="step-chip">Review</div>
      </div>

      <div class="camera-stage">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="captureCanvas" hidden></canvas>
        <div class="camera-overlay">
          <div id="guideFrame" class="guide-frame qr-frame state-idle"></div>
          <div class="camera-hint-box">
            <strong id="cameraStateLabel">Đưa QR vào khung</strong>
            <span id="cameraStateHint">Tự nhận diện và chuyển bước khi thành công.</span>
          </div>
        </div>
      </div>

      <div class="camera-actions">
        <button id="startCameraBtn" class="action-btn secondary">Bật camera</button>
        <button id="captureActionBtn" class="action-btn primary">Quét QR</button>
      </div>

      <div class="preview-strip">
        <div class="preview-pill"><span>QR</span><img id="qrPreview" alt="QR"></div>
        <div class="preview-pill"><span>Trước</span><img id="frontPreview" alt="Mặt trước"></div>
        <div class="preview-pill"><span>Sau</span><img id="backPreview" alt="Mặt sau"></div>
      </div>

      <div id="statusBanner" class="status info">Bật camera để bắt đầu.</div>
    </section>

    <section id="reviewSection" class="review-section">
      <div class="review-head">
        <h2>Xác nhận thông tin</h2>
      </div>

      <div class="form-stack">
        <input id="full_name" placeholder="Họ và tên">
        <div class="two-col">
          <input id="id_number" placeholder="Số CCCD">
          <input id="old_id_number" placeholder="Số CMND cũ">
        </div>
        <div class="two-col">
          <input id="date_of_birth" placeholder="Ngày sinh">
          <input id="gender" placeholder="Giới tính">
        </div>
        <div class="two-col">
          <input id="phone_number" placeholder="Số điện thoại">
          <input id="occupation" placeholder="Nghề nghiệp">
        </div>
        <div class="two-col">
          <input id="issue_date" placeholder="Ngày cấp">
          <input id="expiry_date" placeholder="Ngày hết hạn">
        </div>
        <input id="issue_place" placeholder="Nơi cấp">
        <textarea id="place_of_origin" rows="2" placeholder="Quê quán"></textarea>
        <textarea id="place_of_residence" rows="3" placeholder="Nơi thường trú"></textarea>
        <textarea id="current_address" rows="3" placeholder="Địa chỉ hiện tại"></textarea>
      </div>

      <div class="review-actions stacked-actions">
        <button id="saveBtn" class="action-btn primary" type="button" onclick="saveRecord()">Lưu</button>
        <button id="newRecordBtn" class="action-btn secondary" type="button" onclick="resetRecordFlow()">Tạo mới</button>
      </div>

      <div id="saveStatus" class="status info">Sau khi chụp đủ ảnh, bấm Lưu để ghi hồ sơ.</div>
    </section>

    <div id="saveOverlay" class="save-overlay hidden" aria-live="polite">
      <div id="saveOverlayCard" class="save-overlay-card info">
        <div id="saveOverlayTitle" class="save-overlay-title">Đang lưu hồ sơ…</div>
        <div id="saveOverlayText" class="save-overlay-text">Vui lòng chờ trong giây lát.</div>
      </div>
    </div>

    <section class="debug-section hidden">
      <pre id="debugOutput" class="debug-box">Chưa có dữ liệu debug.</pre>
    </section>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="app.js"></script>
</body>
</html>
